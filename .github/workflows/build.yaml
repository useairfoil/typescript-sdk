name: Build & Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Node version
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Protoc
        uses: arduino/setup-protoc@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: pnpm install
      - name: Show nx projects
        run: pnpm dlx nx show projects
      - name: Run lint
        run: pnpm run lint
      - name: Run format
        run: pnpm run format
      - name: Run build
        run: pnpm run build
      - name: Run typecheck
        run: pnpm run typecheck
      - name: Run test
        run: pnpm run test:ci
